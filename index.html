<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoJSON Visualizer</title>
</head>
<body>
    <h1>GeoJSON Visualizer</h1>
    <button id="loadGeoJson">Load GeoJSON from Repository</button>
    <script>
        document.getElementById('loadGeoJson').onclick = function() {
            const url = 'https://your-repo-url/geojson-file.geojson'; // Replace with your actual GeoJSON URL
            fetch(url)
                .then(response => response.json())
                .then(data => {
                    console.log(data); // Process your GeoJSON data here
                })
                .catch(error => console.error('Error loading GeoJSON:', error));
        };
    </script>
</body>
</html>
