<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebGIS Pro - Modern Interface</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ol@v7.4.0/ol.css">
    <link href="https://unpkg.com/tabulator-tables@5.5.0/dist/css/tabulator_bootstrap5.min.css" rel="stylesheet">
    
    <link rel="stylesheet" href="p1.1.boostrap.css">
</head>
<body>

<nav class="navbar navbar-dark navbar-custom shadow-lg">
    <div class="container-fluid d-flex justify-content-center gap-3">
        <a class="navbar-brand fw-bold d-flex align-items-center" href="#">
            <i class="bi bi-geo-alt-fill me-2" style="color: #0d6efd;"></i>
            <span class="d-none d-sm-inline text-dark">GisViewer</span>
        </a>

        <div class="d-flex align-items-center gap-2">
            <select id="layer-selector" class="form-select form-select-sm rounded-pill border-0 shadow-sm bg-light">
                <option value="osm">🗺️ Ruas</option>
                <option value="sat">🛰️ Satélite</option>
                <option value="hybrid">🌍 Híbrido</option>
            </select>

            <select id="map-proj-selector" class="form-select form-select-sm rounded-pill border-0 shadow-sm bg-light d-none d-md-block">
                <option value="EPSG:4674">SIRGAS 2000</option>
                <option value="EPSG:4326">WGS 84</option>
            </select>

            <label for="file-input" class="btn btn-success btn-sm rounded-pill px-3 fw-bold shadow-sm mb-0">
                <span id="spinner-load" class="spinner-border spinner-border-sm d-none" role="status"></span>
                <i id="icon-upload" class="bi bi-cloud-arrow-up-fill"></i>
                <span class="d-none d-lg-inline ms-1">Abrir ZIP</span>
            </label>
            <input type="file" id="file-input" accept=".zip" hidden>

            <button class="btn btn-light btn-sm rounded-pill px-3 fw-bold text-primary shadow-sm border" onclick="toggleModal()">
                <i class="bi bi-table"></i>
                <span class="d-none d-lg-inline ms-1">Dados</span>
            </button>
        </div>
    </div>
</nav>

<div id="mini-panel" class="card shadow-lg border-0">
    <div class="card-header py-2 d-flex justify-content-between align-items-center">
        <h6 class="mb-0 small fw-bold text-white">Detalhes do Lote</h6>
        <button type="button" class="btn-close btn-close-white" onclick="closeMiniPanel()" style="font-size: 0.7rem;"></button>
    </div>
    <div class="card-body p-3 overflow-auto" id="mini-content" style="max-height: 300px; font-size: 0.85rem;"></div>
    <div class="card-footer border-0">
        <button id="btn-mini-zoom" class="btn btn-primary btn-sm rounded-pill w-100 fw-bold">🔍 Focar no Mapa</button>
    </div>
</div>

<div class="modal fade" id="dataModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-xl modal-dialog-centered">
        <div class="modal-content rounded-4 shadow-lg border-0">
            <div class="modal-header bg-primary text-white">
                <h5 class="modal-title fw-bold"><i class="bi bi-database-fill me-2"></i>Banco de Dados</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body p-0">
                <div id="table-container" style="height: 60vh;"></div>
            </div>
        </div>
    </div>
</div>

<div id="map"></div>

<div id="projection-display" class="projection-badge">
    <i class="bi bi-globe me-1 text-primary"></i>
    <span id="current-epsg">EPSG:4674</span>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/ol@v7.4.0/dist/ol.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/proj4js/2.9.0/proj4.js"></script>
<script src="https://unpkg.com/shpjs@latest/dist/shp.js"></script>
<script src="https://unpkg.com/tabulator-tables@5.5.0/dist/js/tabulator.min.js"></script>
  <script src="p.1.1.js"></script>
</body>


</body>
</html>
