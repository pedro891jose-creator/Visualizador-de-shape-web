<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>WebGIS Pro - Full Feature</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ol@v7.4.0/ol.css">
    <link href="https://unpkg.com/tabulator-tables@5.5.0/dist/css/tabulator_modern.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/ol@v7.4.0/dist/ol.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/proj4js/2.9.0/proj4.js"></script>
    <script src="https://unpkg.com/shpjs@latest/dist/shp.js"></script>
    <script src="https://unpkg.com/tabulator-tables@5.5.0/dist/js/tabulator.min.js"></script>
    
    <style>
        :root {
            --azul: #1D70A2;
            --verde: #2E7D32;
            --marrom: #8D6E63;
        }

        body, html { margin: 0; padding: 0; height: 100%; width: 100%; font-family: 'Segoe UI', sans-serif; overflow: hidden; }

        /* Cabeçalho */
        header {
            position: absolute; top: 10px; left: 10px; right: 10px;
            background: rgba(29, 112, 162, 0.95); backdrop-filter: blur(10px);
            color: white; padding: 12px 20px; border-radius: 8px;
            display: flex; justify-content: space-between; align-items: center;
            z-index: 1000; box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        #map { height: 100vh; width: 100vw; background: #eee; }

        /* Mini Painel Lateral (Lote Único) */
        #mini-panel {
            display: none; position: absolute; top: 85px; right: 20px;
            width: 320px; max-height: 450px; background: white;
            border-radius: 8px; box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            z-index: 2000; flex-direction: column; border-top: 6px solid var(--verde);
        }
        .mini-header { background: #f8f9fa; padding: 10px; font-weight: bold; display: flex; justify-content: space-between; border-bottom: 1px solid #ddd; }
        .mini-content { overflow-y: auto; flex: 1; padding: 10px; font-size: 13px; }

        /* Modal Tabela Completa (Banco de Dados) */
        #table-modal {
            display: none; position: fixed; z-index: 3000; 
            left: 50%; top: 50%; transform: translate(-50%, -50%);
            width: 95%; height: 85%; background: white; border-radius: 10px; flex-direction: column;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
        }

        /* Botões */
        .btn { border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-upload { background: var(--verde); color: white; }
        .btn-full-table { background: var(--marrom); color: white; }
        .btn-zoom-action { background: var(--azul); color: white; border: none; padding: 4px 8px; border-radius: 3px; cursor: pointer; font-size: 11px; }

        /* Infos de Projeção */
        .proj-box { position: absolute; bottom: 20px; left: 20px; background: white; padding: 8px 12px; border-radius: 4px; font-size: 11px; font-weight: bold; box-shadow: 0 2px 5px rgba(0,0,0,0.2); z-index: 500; }
    </style>
</head>
<body>

<header>
    <div style="font-weight: bold; font-size: 1.1rem;">🌊 WebGIS Pro-Data</div>
    <div style="display: flex; gap: 10px; align-items: center;">
        <select id="map-proj-selector" style="border-radius:4px; border:none; padding:5px;">
            <option value="EPSG:4674">SIRGAS 2000</option>
            <option value="EPSG:4326">WGS 84</option>
            <option value="EPSG:4291">SAD 69</option>
        </select>
        <label for="file-input" class="btn btn-upload">🌱 Carregar ZIP</label>
        <input type="file" id="file-input" accept=".zip" style="display: none;">
        <button class="btn btn-full-table" onclick="toggleModal()">📊 Tabela Completa</button>
    </div>
</header>

<div id="map">
    <div class="proj-box">MAPA: <span id="active-proj-text" style="color:var(--azul)">EPSG:4674</span></div>
</div>

<div id="mini-panel">
    <div class="mini-header">
        <span>📍 Detalhes do Lote</span>
        <button onclick="closeMiniPanel()" style="border:none; background:none; cursor:pointer; font-size:18px;">&times;</button>
    </div>
    <div id="mini-content" class="mini-content"></div>
    <div style="padding: 10px; background: #f8f9fa;">
        <button id="btn-mini-zoom" class="btn btn-upload" style="width: 100%;">🔍 Aproximar no Mapa</button>
    </div>
</div>

<div id="table-modal">
    <div style="padding:15px; background:var(--azul); color:white; display:flex; justify-content:space-between; border-radius:10px 10px 0 0;">
        <strong>📊 Banco de Dados Completo (Virtualizado)</strong>
        <button onclick="toggleModal()" style="border:none; padding:5px 15px; border-radius:4px; cursor:pointer; font-weight:bold;">Fechar</button>
    </div>
    <div id="table-container" style="flex:1;"></div>
</div>

<script>
    // Configurações Proj4
    proj4.defs("EPSG:4674", "+proj=longlat +ellps=GRS80 +towgs84=0,0,0,0,0,0,0 +no_defs");
    proj4.defs("EPSG:4291", "+proj=longlat +ellps=aust_SA +towgs84=-67.35,3.88,-38.22,0,0,0,0 +units=degrees +no_defs");
    ol.proj.proj4.register(proj4);

    const vectorSource = new ol.source.Vector();
    const map = new ol.Map({
        target: 'map',
        layers: [ new ol.layer.Tile({ source: new ol.source.OSM() }), new ol.layer.Vector({ source: vectorSource }) ],
        view: new ol.View({ projection: 'EPSG:4674', center: [-50, -15], zoom: 4 })
    });

    const highlightStyle = new ol.style.Style({
        stroke: new ol.style.Stroke({ color: '#FFD700', width: 4 }),
        fill: new ol.style.Fill({ color: 'rgba(255, 215, 0, 0.4)' })
    });

    let selectedFeature = null;
    let table;

    // Ação de Zoom
    function zoomTo(f) {
        if (!f) return;
        if (selectedFeature) selectedFeature.setStyle(undefined);
        f.setStyle(highlightStyle);
        selectedFeature = f;
        map.getView().fit(f.getGeometry().getExtent(), { duration: 1000, padding: [100, 100, 100, 100], maxZoom: 18 });
    }

    // Clique no Mapa
    map.on('singleclick', function(evt) {
        const feature = map.forEachFeatureAtPixel(evt.pixel, (f) => f, { hitTolerance: 5 });
        if (feature) {
            zoomTo(feature);
            showMiniPanel(feature);
        } else {
            closeMiniPanel();
        }
    });

    function showMiniPanel(f) {
        const content = document.getElementById('mini-content');
        const props = f.getProperties();
        let html = '';
        for (let k in props) {
            if (k !== 'geometry' && k !== 'internalId') {
                html += `<div style="display:flex; justify-content:space-between; padding:4px 0; border-bottom:1px solid #eee;">
                            <b style="color:var(--azul)">${k}:</b> <span>${props[k] || ''}</span>
                         </div>`;
            }
        }
        content.innerHTML = html;
        document.getElementById('mini-panel').style.display = 'flex';
        document.getElementById('btn-mini-zoom').onclick = () => zoomTo(f);
    }

    function closeMiniPanel() {
        document.getElementById('mini-panel').style.display = 'none';
        if (selectedFeature) selectedFeature.setStyle(undefined);
    }

    // Configuração da Tabela Completa (Tabulator)
    function setupFullTable(features) {
        const data = features.map((f, i) => {
            f.set('internalId', i);
            const { geometry, ...props } = f.getProperties();
            return { id: i, ...props };
        });

        table = new Tabulator("#table-container", {
            data: data,
            autoColumns: true,
            layout: "fitColumns",
            pagination: "local",
            paginationSize: 25,
            height: "100%",
            columns: [
                {title: "Localizar", formatter: () => "🔍 Zoom", width: 100, hozAlign: "center", cellClick: (e, cell) => {
                    const feat = vectorSource.getFeatures()[cell.getData().id];
                    zoomTo(feat);
                    toggleModal(); // Fecha a tabela ao dar zoom
                }},
            ],
            autoColumnsDefinitions: (defs) => {
                defs.forEach(col => { if(col.field == "id") col.visible = false; });
                return defs;
            }
        });
    }

    // Upload de Arquivo
    document.getElementById('file-input').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(event) {
            shp(event.target.result).then(function(geojson) {
                const features = new ol.format.GeoJSON().readFeatures(geojson, { featureProjection: map.getView().getProjection() });
                vectorSource.clear();
                vectorSource.addFeatures(features);
                map.getView().fit(vectorSource.getExtent(), { padding: [50, 50, 50, 50], duration: 1000 });
                setupFullTable(features);
            });
        };
        reader.readAsArrayBuffer(file);
    });

    function toggleModal() {
        const m = document.getElementById('table-modal');
        m.style.display = (m.style.display === 'flex') ? 'none' : 'flex';
        if(table) table.redraw(true);
    }

    document.getElementById('map-proj-selector').addEventListener('change', function(e) {
        const newProj = e.target.value;
        const view = map.getView();
        map.setView(new ol.View({
            projection: newProj,
            center: ol.proj.transform(view.getCenter(), view.getProjection(), newProj),
            zoom: view.getZoom()
        }));
        document.getElementById('active-proj-text').innerText = newProj;
    });
</script>
</body>
</html>
